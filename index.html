<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌤️ Weather App</h1>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name"
            >

            <button id="searchBtn">
                Search
            </button>
            <button id="locationBtn">📍 Use My Location</button>
        </div>

        <div id="weatherContainer">

    <img
        id="weatherIcon"
        src=""
        alt="Weather Icon"
    >

    <h2 id="cityName">City Name</h2>

    <p id="temperature">
        Temperature:
    </p>

    <p id="weatherCondition">
        Condition:
    </p>

    <p id="humidity">
        Humidity:
    </p>

    <p id="windSpeed">
        Wind Speed:
    </p>

    <p id="feelsLike">
        Feels Like:
    </p>

</div>

<h2>5-Day Forecast</h2>

<div id="forecastContainer">

</div>

<div id="loading" class="hidden">
    Loading...
</div>

<p id="errorMessage" class="hidden"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
